  <a routerLink="/" style="font-family: 'Outfit'; font-size: 1.8rem; font-weight: 800; color: var(--accent-primary); letter-spacing: 2px;">NEO4FLIX</a>
  
  <div style="display: flex; gap: 1.5rem; align-items: center;">

version: '3.8'

services:
  neo4j:
    image: neo4j:5.18.0
    container_name: neo4flix-neo4j
    ports:
      - "7474:7474" # Browser Web
      - "7687:7687" # Bolt Protocol (Spring Data Neo4j)
    environment:
      - NEO4J_AUTH=neo4j/neo4flix_password
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - neo4j_data:/data
    networks:
      - neo4flix_network

  movie-service:
    build:
      context: ./services/movie-service
      dockerfile: Dockerfile
    container_name: neo4flix-movie-service
    ports:
      - "8081:8080"
    environment:
      - SPRING_NEO4J_URI=bolt://neo4j:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=neo4flix_password
    depends_on:
      - neo4j
    networks:
      - neo4flix_network

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: neo4flix-user-service
    ports:
      - "8082:8080"
    environment:
      - SPRING_NEO4J_URI=bolt://neo4j:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=neo4flix_password
    depends_on:
      - neo4j
    networks:
      - neo4flix_network

  rating-service:
    build:
      context: ./services/rating-service
      dockerfile: Dockerfile
    container_name: neo4flix-rating-service
    ports:
      - "8083:8080"
    environment:
      - SPRING_NEO4J_URI=bolt://neo4j:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=neo4flix_password
    depends_on:
      - neo4j
    networks:
      - neo4flix_network

  recommendation-service:
    build:
      context: ./services/recommendation-service
      dockerfile: Dockerfile
    container_name: neo4flix-recommendation-service
    ports:
      - "8084:8080"
    environment:
      - SPRING_NEO4J_URI=bolt://neo4j:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=neo4flix_password
    depends_on:
      - neo4j
    networks:
      - neo4flix_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neo4flix-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - movie-service
      - user-service
      - rating-service
      - recommendation-service
    networks:
      - neo4flix_network

networks:
  neo4flix_network:
    driver: bridge

volumes:
  neo4j_data:
